worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    server {
        listen 8080 ssl http2;
        server_name _;

        # Redirect plain HTTP requests to HTTPS (same port)
        error_page 497 =301 https://$host:$server_port$request_uri;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Frontend static assets - served directly by nginx
        location /assets/ {
            alias /app/frontend/dist/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /fonts/ {
            alias /app/frontend/dist/fonts/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location = /manifest.json {
            root /app/frontend/dist;
        }

        location = /icon-192.png {
            root /app/frontend/dist;
        }

        location = /icon-512.png {
            root /app/frontend/dist;
        }

        # Thumbnails - served directly by nginx from cache
        location /thumbnails/ {
            alias /cache/thumbnails/;
            expires 1d;
            add_header Cache-Control "public";
        }

        # Media files - served directly by nginx (no auth)
        location /media/ {
            alias /media/;
            expires 1d;
            add_header Cache-Control "public";
        }

        # API and backend routes - proxy to Gunicorn
        location /api/ {
            proxy_pass http://127.0.0.1:8081;
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA fallback - serve index.html for all other paths
        location / {
            root /app/frontend/dist;
            try_files $uri $uri/ /index.html;
        }
    }
}
